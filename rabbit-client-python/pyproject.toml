[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "simple-rabbit"
version = "0.1.0"
description = "Minimal aio-pika-only RabbitMQ publisher/consumer with robust reconnect, per-message acks, and prefetch concurrency"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aio-pika>=9.4",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/simple_rabbit"]

[tool.hatch.build.targets.sdist]
include = ["src/simple_rabbit", "tests", "README.md"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
